name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0). Creates the tag if it does not exist.'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build shadow jar
        run: ./gradlew --no-daemon shadowJar

      - name: Resolve artifact and version
        id: artifact
        run: |
          JAR=$(ls build/libs/warden-*.jar | grep -v sources | grep -v javadoc | head -n1)
          VERSION=$(basename "$JAR" .jar | sed 's/^warden-//')
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "jar=$JAR" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.artifact.outputs.tag }}
          name: Warden ${{ steps.artifact.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ steps.artifact.outputs.jar }}
